name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 전체 의존성 설치 (install:all)
        run: npm run install:all

      - name: 프론트엔드 빌드 검증
        run: npm run build --prefix frontend

      - name: 백엔드 빌드 검증
        run: npm run build --prefix backend
